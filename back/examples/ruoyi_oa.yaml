openapi: 3.0.3
info: { title: RuoYi-Vue-OA 请假流程, version: 1.0.0 }
servers:
  - url: https://u858758-netf-d87bf18d.westd.seetacloud.com:8443/prod-api
components:
  schemas:
    AjaxResult:
      type: object
      properties: { code: { type: integer }, msg: { type: string } }
    FlowTaskVo:
      type: object
      properties:
        taskId: { type: string }
        defId: { type: string }
        todoId: { type: string }
        templateId: { type: string }
        comment: { type: string }
        variables: { type: object }
    CommonFlowSubmit:
      type: object
      required: [operateType, flowTask, template]
      properties:
        operateType: { type: string }
        flowTask: { $ref: '#/components/schemas/FlowTaskVo' }
        template: { type: object, properties: { id: { type: string } } }
paths:
  /captchaImage: { get: { operationId: get_captcha, summary: 获取验证码 } }
  /login:
    post:
      operationId: login
      summary: 用户登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, code, uuid]
              properties:
                username: { type: string }
                password: { type: string }
                code: { type: string }
                uuid: { type: string }
  /getInfo: { get: { operationId: get_user_info, summary: 当前用户信息 } }
  /template/template/newStart: { get: { operationId: list_startable_templates, summary: 可发起模板 } }
  /workflow/handle/startFlow:
    post:
      operationId: start_leave_flow
      summary: 发起请假流程
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [templateId]
              properties:
                templateId: { type: string }
  /biz/form/save:
    post:
      operationId: save_leave_form
      summary: 保存业务表单(返回 businessId)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [templateId, taskId]
              properties:
                bizId: { type: string }
                templateId: { type: string }
                taskId: { type: string }
                procInstId: { type: string }
                title: { type: string }
                valData: { type: object }
  /biz/flow/submit:
    post:
      operationId: submit_flow_task
      summary: 提交/审批任务
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CommonFlowSubmit' }
  /workflow/todo/list: { get: { operationId: list_todo, summary: 我的待办 } }
  /workflow/done/list: { get: { operationId: list_done, summary: 我的已办 } }
  /flowable/definition/list:
    get:
      operationId: list_definitions
      summary: 流程定义列表
      parameters:
        - { name: pageNum, in: query, schema: { type: integer } }
        - { name: pageSize, in: query, schema: { type: integer } }
        - { name: name, in: query, schema: { type: string } }
  /flowable/definition/save:
    post:
      operationId: deploy_definition
      summary: 部署 BPMN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [procDefKey, name, xml]
              properties:
                procDefKey: { type: string }
                name: { type: string }
                xml: { type: string }
