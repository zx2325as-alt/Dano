name: Sync Latest P0 Into P1

on:
  push:
    branches:
      - "fix/option-capability-p1"
    paths:
      - ".github/workflows/sync-option-p1-latest-p0.yml"

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/option-capability-p1
          fetch-depth: 0
      - name: Merge latest P0
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin fix/option-capability-p0
          git merge --no-ff origin/fix/option-capability-p0 -m "merge: sync latest P0 guard into P1"
          git push origin HEAD:fix/option-capability-p1
