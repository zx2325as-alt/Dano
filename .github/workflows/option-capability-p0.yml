name: Option Capability P0

on:
  pull_request:
    paths:
      - "back/**"
      - "skillfrontend/**"
      - ".github/workflows/option-capability-p0.yml"
  push:
    branches:
      - "fix/option-capability-p0"
    paths:
      - "back/**"
      - "skillfrontend/**"
      - ".github/workflows/option-capability-p0.yml"

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: back
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: back/pyproject.toml
      - name: Install focused backend test dependencies
        run: >-
          python -m pip install -q
          pytest pytest-asyncio httpx structlog
          fastapi pydantic pydantic-settings pyyaml
      - name: Run option and request-capture tests
        id: backend_tests
        continue-on-error: true
        shell: bash
        run: |
          status=0
          python -m pytest -q --tb=short \
            back/tests/test_option_capability_p0.py \
            back/tests/test_option_capability_security_p0.py \
            back/tests/test_option_capability_quality_p0.py \
            back/tests/test_option_capability_integrity_p0.py \
            > pytest-option-p0.log 2>&1 || status=$?
          python -m pytest -q --tb=short \
            back/tests/test_request_capture.py \
            -k "not export_options_md_lists_candidates and not manifest_and_export_write_skill_interface" \
            >> pytest-option-p0.log 2>&1 || status=$?
          exit "$status"
      - name: Upload backend test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-option-p0
          path: pytest-option-p0.log
          if-no-files-found: error
      - name: Report backend test failure
        if: steps.backend_tests.outcome != 'success'
        run: |
          tail -n 220 pytest-option-p0.log
          exit 1

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skillfrontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: skillfrontend/package-lock.json
      - name: Install frontend
        run: npm ci
      - name: Type-check and build frontend
        run: npm run build
