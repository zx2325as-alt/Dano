name: Option Capability P0

on:
  pull_request:
    paths:
      - "back/**"
      - "skillfrontend/**"
      - ".github/workflows/option-capability-p0.yml"
  push:
    branches:
      - "fix/option-capability-p0"
    paths:
      - "back/**"
      - "skillfrontend/**"
      - ".github/workflows/option-capability-p0.yml"

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: back/pyproject.toml
      - name: Install backend
        run: python -m pip install -e './back[dev]'
      - name: Run option and request-capture tests
        run: >-
          python -m pytest
          back/tests/test_option_capability_p0.py
          back/tests/test_skill_interface_privacy_p0.py
          back/tests/test_request_capture.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skillfrontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: skillfrontend/package-lock.json
      - name: Install frontend
        run: npm ci
      - name: Type-check and build frontend
        run: npm run build
