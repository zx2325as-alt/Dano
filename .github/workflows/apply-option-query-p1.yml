name: Apply Option Query P1 Contract

on:
  push:
    branches:
      - "feat/option-query-p1"
    paths:
      - "scripts/apply_option_query_p1.py"
      - ".github/workflows/apply-option-query-p1.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/option-query-p1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply exact contract edits
        run: python scripts/apply_option_query_p1.py
      - name: Remove one-shot codemod
        run: rm scripts/apply_option_query_p1.py .github/workflows/apply-option-query-p1.yml
      - name: Commit generated edits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --exit-code && exit 0
          git commit -m "feat(options): wire P1 query contract end to end [skip ci]"
          git push origin HEAD:feat/option-query-p1
