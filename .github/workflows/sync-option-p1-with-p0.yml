name: Sync Option P1 With P0

on:
  push:
    branches:
      - "fix/option-capability-p1"
    paths:
      - "scripts/sync_option_p1_with_p0.py"
      - ".github/workflows/sync-option-p1-with-p0.yml"

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/option-capability-p1
          fetch-depth: 0
      - name: Merge latest P0
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin fix/option-capability-p0
          set +e
          git merge --no-ff --no-commit origin/fix/option-capability-p0
          merge_status=$?
          set -e
          conflicts=$(git diff --name-only --diff-filter=U)
          if [ -n "$conflicts" ]; then
            unexpected=$(printf '%s\n' "$conflicts" | grep -v '^skillfrontend/src/api/skills.ts$' || true)
            if [ -n "$unexpected" ]; then
              echo "Unexpected conflicts:"
              printf '%s\n' "$unexpected"
              exit 1
            fi
            git checkout --ours skillfrontend/src/api/skills.ts
          elif [ "$merge_status" -ne 0 ]; then
            echo "Merge failed without a resolvable conflict"
            exit 1
          fi
          python scripts/sync_option_p1_with_p0.py
          git add skillfrontend/src/api/skills.ts
          if git diff --cached --quiet && git diff --quiet; then
            echo "P1 already contains latest P0"
            exit 0
          fi
          git add -A
          git commit -m "merge: sync latest P0 hardening into P1"
          git push origin HEAD:fix/option-capability-p1
