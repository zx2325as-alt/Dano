name: Apply Transaction Authority P4

on:
  push:
    branches:
      - "feat/transaction-ir-authority-p4"
    paths:
      - "scripts/apply_transaction_authority_publish_p4.py"
      - ".github/workflows/apply-transaction-authority-p4.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/transaction-ir-authority-p4
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply exact publish-pipeline edit
        run: python scripts/apply_transaction_authority_publish_p4.py
      - name: Remove one-shot files
        run: rm scripts/apply_transaction_authority_publish_p4.py .github/workflows/apply-transaction-authority-p4.yml
      - name: Commit generated authority integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --exit-code && exit 0
          git commit -m "feat(ir): seal and revalidate final transaction asset before publish"
          git push origin HEAD:feat/transaction-ir-authority-p4
