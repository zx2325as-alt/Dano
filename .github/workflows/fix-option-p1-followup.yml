name: Fix Option Capability P1 Follow-up

on:
  push:
    branches:
      - "fix/option-capability-p1"
    paths:
      - "scripts/fix_option_p1_followup.py"
      - ".github/workflows/fix-option-p1-followup.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/option-capability-p1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply follow-up fixes
        run: python scripts/fix_option_p1_followup.py
      - name: Commit follow-up fixes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No follow-up changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add back/dano/execution/page/option_query.py \
                  skillfrontend/src/components/InvokeDrawer.tsx
          git commit -m "fix(options): stabilize remote search and source pagination"
          git push origin HEAD:fix/option-capability-p1
