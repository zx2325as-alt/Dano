name: Trace Causality P6

on:
  pull_request:
    paths:
      - "back/dano/execution/page/capture_bundle.py"
      - "back/dano/execution/page/trace_ir.py"
      - "back/dano/execution/page/trace_normalizer.py"
      - "back/dano/execution/page/trace_normalizer_p6.py"
      - "back/dano/execution/page/recorder.py"
      - "back/dano/gateway/app.py"
      - "back/tests/test_trace_causality_p6.py"
      - ".github/workflows/trace-causality-p6.yml"
  push:
    branches:
      - "feat/trace-ir-causal-p6"

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: back
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install focused dependencies
        run: python -m pip install -q pytest pytest-asyncio httpx structlog fastapi pydantic pydantic-settings pyyaml
      - name: Run causal trace and compatibility tests
        run: |
          python -m pytest -q --tb=short \
            back/tests/test_trace_causality_p6.py \
            back/tests/test_transaction_ir_compiler_p5.py \
            back/tests/test_transaction_ir_integrity_p5.py
          python -m pytest -q --tb=short back/tests/test_request_capture.py \
            -k "capture_bundle or trace_ir or transaction_ir_source_keeps_read_trace_evidence or ir_compiler_attaches_publish_time_transaction_ir"
