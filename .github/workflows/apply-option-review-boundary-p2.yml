name: Apply Option Review Boundary P2

on:
  push:
    branches:
      - "feat/option-inference-review-p2"
    paths:
      - "scripts/apply_option_review_gateway_p2.py"
      - "scripts/apply_option_review_ui_state_p2.py"
      - "scripts/apply_option_review_ui_publish_p2.py"
      - ".github/workflows/apply-option-review-boundary-p2.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/option-inference-review-p2
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply exact gateway and recorder edits
        run: |
          python scripts/apply_option_review_gateway_p2.py
          python scripts/apply_option_review_ui_state_p2.py
          python scripts/apply_option_review_ui_publish_p2.py
      - name: Remove one-shot files
        run: |
          rm scripts/apply_option_review_gateway_p2.py
          rm scripts/apply_option_review_ui_state_p2.py
          rm scripts/apply_option_review_ui_publish_p2.py
          rm .github/workflows/apply-option-review-boundary-p2.yml
      - name: Commit generated review boundary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --exit-code && exit 0
          git commit -m "feat(options): enforce server-owned inference review"
          git push origin HEAD:feat/option-inference-review-p2
