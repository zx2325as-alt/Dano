name: Apply P1 Test Fix

on:
  push:
    branches:
      - "feat/option-query-p1"
    paths:
      - "scripts/fix_option_query_p1_tests.py"
      - ".github/workflows/apply-option-query-p1-test-fix.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/option-query-p1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/fix_option_query_p1_tests.py
      - run: rm scripts/fix_option_query_p1_tests.py .github/workflows/apply-option-query-p1-test-fix.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --exit-code && exit 0
          git commit -m "test(options): align P1 array mapping expectation"
          git push origin HEAD:feat/option-query-p1
