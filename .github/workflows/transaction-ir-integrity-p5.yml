name: Transaction IR Integrity P5

on:
  pull_request:
    paths:
      - "back/dano/execution/page/ir_integrity_p5.py"
      - "back/dano/execution/page/transaction_ir.py"
      - "back/dano/execution/page/ir_compiler.py"
      - "back/dano/execution/page/ir_repair_p5.py"
      - "back/tests/test_transaction_ir_integrity_p5.py"
      - ".github/workflows/transaction-ir-integrity-p5.yml"
  push:
    branches:
      - "feat/transaction-ir-compiler-p5"

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: back
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: python -m pip install -q pytest pytest-asyncio httpx structlog fastapi pydantic pydantic-settings pyyaml
      - name: Verify IR ownership and rollback invariants
        run: python -m pytest -q --tb=short back/tests/test_transaction_ir_integrity_p5.py
