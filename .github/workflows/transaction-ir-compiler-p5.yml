name: Transaction IR Compiler P5

on:
  pull_request:
    paths:
      - "back/**"
      - ".github/workflows/transaction-ir-compiler-p5.yml"
  push:
    branches:
      - "feat/transaction-ir-compiler-p5"
    paths:
      - "back/**"
      - ".github/workflows/transaction-ir-compiler-p5.yml"

concurrency:
  group: transaction-ir-compiler-p5-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: back
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: back/pyproject.toml
      - name: Install focused backend dependencies
        run: >-
          python -m pip install -q
          pytest pytest-asyncio httpx structlog
          fastapi pydantic pydantic-settings pyyaml
      - name: Run P0-P5 option and IR tests
        id: backend_tests
        continue-on-error: true
        shell: bash
        run: |
          status=0
          python -m pytest -q --tb=short \
            back/tests/test_option_capability_p0.py \
            back/tests/test_option_capability_security_p0.py \
            back/tests/test_option_capability_quality_p0.py \
            back/tests/test_option_capability_integrity_p0.py \
            back/tests/test_option_capability_compile_guard_p0.py \
            back/tests/test_option_query_p1.py \
            back/tests/test_option_query_validation_p1.py \
            back/tests/test_option_query_manifest_p1.py \
            back/tests/test_option_query_edge_p1.py \
            back/tests/test_option_query_inference_p2.py \
            back/tests/test_option_query_validation_fallback_p2.py \
            back/tests/test_transaction_ir_records_path_p2.py \
            back/tests/test_option_query_review_p2.py \
            back/tests/test_option_query_review_ir_p2.py \
            back/tests/test_option_query_gateway_review_p2.py \
            back/tests/test_option_reference_p3.py \
            back/tests/test_option_reference_orchestrator_p3.py \
            back/tests/test_skill_interface_p3.py \
            back/tests/test_transaction_authority_p4.py \
            back/tests/test_transaction_ir_compiler_p5.py \
            > pytest-transaction-ir-compiler-p5.log 2>&1 || status=$?
          python -m pytest -q --tb=short \
            back/tests/test_request_capture.py \
            -k "not export_options_md_lists_candidates and not manifest_and_export_write_skill_interface and not skill_interface_describes_sources_bindings_and_derived" \
            >> pytest-transaction-ir-compiler-p5.log 2>&1 || status=$?
          exit "$status"
      - name: Upload backend diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-transaction-ir-compiler-p5
          path: pytest-transaction-ir-compiler-p5.log
          if-no-files-found: error
      - name: Report backend failure
        if: steps.backend_tests.outcome != 'success'
        run: |
          tail -n 800 pytest-transaction-ir-compiler-p5.log
          exit 1
