name: Apply Trace Timeline P6

on:
  push:
    branches:
      - "feat/trace-ir-causal-p6"
    paths:
      - "scripts/apply_trace_timeline_p6.py"
      - ".github/workflows/apply-trace-timeline-p6.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/trace-ir-causal-p6
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/apply_trace_timeline_p6.py
      - run: rm scripts/apply_trace_timeline_p6.py .github/workflows/apply-trace-timeline-p6.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(trace): record interleaved UI and network events"
          git push origin HEAD:feat/trace-ir-causal-p6
