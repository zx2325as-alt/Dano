name: Apply Option Inference UI P2

on:
  push:
    branches:
      - "feat/option-inference-p2"
    paths:
      - "scripts/apply_option_inference_ui_p2.py"
      - ".github/workflows/apply-option-inference-ui-p2.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/option-inference-p2
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply exact recorder UI edits
        run: python scripts/apply_option_inference_ui_p2.py
      - name: Remove one-shot files
        run: rm scripts/apply_option_inference_ui_p2.py .github/workflows/apply-option-inference-ui-p2.yml
      - name: Commit generated UI edits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --exit-code && exit 0
          git commit -m "feat(options): show inferred query capabilities in recorder"
          git push origin HEAD:feat/option-inference-p2
