name: Apply Option Query Manifest P1

on:
  push:
    branches:
      - "feat/option-query-p1"
    paths:
      - "scripts/apply_option_query_manifest_p1.py"
      - ".github/workflows/apply-option-query-manifest-p1.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/option-query-p1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/apply_option_query_manifest_p1.py
      - run: rm scripts/apply_option_query_manifest_p1.py .github/workflows/apply-option-query-manifest-p1.yml
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --exit-code && exit 0
          git commit -m "feat(options): expose P1 query capabilities in manifest"
          git push origin HEAD:feat/option-query-p1
