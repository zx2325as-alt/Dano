name: Apply Option P1 Hardening

on:
  push:
    branches:
      - "fix/option-capability-p1"
    paths:
      - "scripts/apply_option_p1_hardening.py"
      - ".github/workflows/apply-option-p1-hardening.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/option-capability-p1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply hardening patch
        run: python scripts/apply_option_p1_hardening.py
      - name: Commit hardening
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No hardening changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add back/dano/execution/page/option_query.py \
                  back/dano/execution/page/option_p0.py \
                  back/dano/gateway/app.py \
                  skillfrontend/src/api/skills.ts \
                  skillfrontend/src/components/InvokeDrawer.tsx
          git commit -m "fix(options): harden bindings pagination and cascades"
          git push origin HEAD:fix/option-capability-p1
